# Repo-root typos config for the template's own `prek run` (its CI renders the
# template and lints the output instead of running prek here). Scoped to the
# root, outside `template/`, so generated projects are unaffected.
#
# `CPY` is a ruff rule code (flake8-copyright) referenced in the ruff `ignore`
# list in template/pyproject.toml.jinja. typos misreads it as COPY/CPU only in
# the `.jinja` source — the rendered `.toml` parses cleanly — so allow the token.
[default.extend-identifiers]
CPY = "CPY"
