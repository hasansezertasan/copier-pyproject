---
name: Template CI
"on":
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
concurrency:
  group: template-ci-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  render:
    name: Render & test (${{ matrix.scenario.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        scenario:
          # Bare template — only the always-on core/utils modules.
          - name: minimal
            data: ""
          # Kitchen sink with FastAPI + Redis worker + pydantic settings.
          - name: full-fastapi-redis
            data: >-
              --data include_cli=true --data include_web=true --data web_framework=fastapi --data include_gui=true --data include_tui=true --data include_mcp=true --data include_worker=true --data worker_broker=redis --data include_pydantic_settings=true
          # Exercise the other web framework and broker branches.
          - name: litestar-kafka
            data: >-
              --data include_web=true --data web_framework=litestar --data include_worker=true --data worker_broker=kafka
          # Compiles the Cython extension during the wheel build.
          - name: c-extensions
            data: --data include_c_extensions=true
          # Standalone-executable toggles (ADR-007), exercised independently and
          # combined the way worker_broker is. These render the .spec, the mise
          # tasks, the tool-group deps, and the build-* release jobs so style
          # (validate-pyproject, taplo, actionlint) lints them — the heavy
          # nuitka/pyinstaller/pycrucible deps live in the `tool` group, which
          # only the `profile` env installs, so they are not pulled here.
          # include_cli so the CLI-gated "Smoke-run" build-check steps in ci.yml
          # render and get actionlint-ed (the smoke step is identical across tools).
          - name: launcher
            data: --data include_launcher=true --data include_cli=true
          - name: freezer
            data: --data include_freezer=true
          - name: compiler
            data: --data include_compiler=true
          # All three at once + a GUI, to cover the combined needs-wiring and the
          # GUI-specific branches (spec console=False, Nuitka per-OS window flags).
          - name: executables-gui
            data: >-
              --data include_launcher=true --data include_freezer=true --data include_compiler=true --data include_gui=true
          # A server component (web) behind a freezer, so the non-CLI, non-GUI
          # entrypoint path (__main__ dispatches to web.app:main) is render-checked
          # against the .spec/freeze wiring — the build-* smoke step stays gated on
          # include_cli, so this only validates rendering, not a binary launch.
          - name: web-freezer
            data: --data include_web=true --data web_framework=fastapi --data include_freezer=true
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
        with:
          # hatch-vcs (in generated projects) and copier --vcs-ref=HEAD need
          # full history and tags.
          fetch-depth: 0
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true
      - name: Render template
        # uvx provides copier without mise; the later `uv run` steps execute in
        # ../rendered, where a mise shim would not resolve the repo's tools.
        run: >
          uvx copier copy --data-file .example-input.yml ${{ matrix.scenario.data }} --defaults --trust --vcs-ref=HEAD . ../rendered

      - name: Style checks
        working-directory: ../rendered
        run: uv run tox run -e style
      - name: Tests
        working-directory: ../rendered
        run: uv run tox run -e 3.12
      - name: Verify Cython extension is built and importable
        # The package __init__ swallows a missing-extension ImportError with a
        # warning, and the generated test_c_extension uses importorskip, so a
        # build hook that silently produces no .so would still pass green. Build
        # a wheel and import the compiled symbol to fail loudly if it doesn't.
        if: matrix.scenario.name == 'c-extensions'
        working-directory: ../rendered
        run: |
          uv build --wheel
          wheels=(dist/*.whl)
          uv run --no-project --with "${wheels[0]}" python -c \
            "from example._c_extension import fibonacci_cython; assert fibonacci_cython(10) == 55"
      - name: Verify standalone executables get unique per-tool/per-OS names
        # template-ci does not build the binaries (the heavy nuitka/pyinstaller/
        # pycrucible deps live in the `tool` group), so assert at the render level
        # that each build job names its artifact <pkg>-<tool>-<label>. Bare
        # ./dist/ paths would let merge-multiple silently overwrite same-named
        # binaries across tools/OSes and drop platforms from the release (ADR-007).
        if: matrix.scenario.name == 'executables-gui'
        working-directory: ../rendered
        run: |
          wf=.github/workflows/release-please.yml
          # Require each tool's binary name to be OS-qualified: the "example-<tool>-"
          # prefix and a matrix.label reference on the same line. Asserting the
          # label qualifier (not just the prefix) is what pins per-OS uniqueness —
          # a hardcoded "example-<tool>-linux" or a bare prefix would pass a plain
          # substring check but still collide under merge-multiple. (The artifact
          # name uses "example-executable-<tool>-" and won't match.)
          for tool in launcher freezer compiler; do
            grep -Eq "example-${tool}-.*matrix\.label" "$wf" \
              || { echo "::error::release-please.yml does not name the ${tool} artifact uniquely per OS (missing matrix.label qualifier)"; exit 1; }
          done
