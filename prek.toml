# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json

exclude = '''
(?x)^(
  # Ignore `.devcontainer/devcontainer.json`
  |\.devcontainer/devcontainer\.json$

  # Ignore `.vscode/launch.json`
  |\.vscode/launch\.json$

  # Ignore `.zed/debug.json`
  |\.zed/debug\.json$

  # Ignore VCS and Python build/virtualenv directories
  |\.git
  |\.hg
  |\.mypy_cache
  |\.nox
  |\.tox
  |\.venv
  |_build
  |buck-out
  |build
  |dist
  |alembic
)$
'''
default_stages = ["pre-commit", "pre-push"]

[ci]
autofix_commit_msg = """
[pre-commit.ci] auto fixes from pre-commit.com hooks

for more information, see https://pre-commit.ci
"""
autofix_prs = true
autoupdate_branch = ""
autoupdate_commit_msg = "chore(deps): [pre-commit.ci] pre-commit autoupdate"
autoupdate_schedule = "weekly"
skip = []
submodules = false

[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
  { id = "check-added-large-files", name = "Check added large files", args = [
    "--maxkb=1000",
  ] },
  { id = "check-toml", name = "Check TOML" },
  { id = "check-yaml", name = "Check YAML", args = [
    "--unsafe",
  ] },
  { id = "check-json", name = "Check JSON" },
  { id = "end-of-file-fixer", name = "End of file fixer" },
  { id = "trailing-whitespace", name = "Trailing whitespace" },
  { id = "debug-statements", name = "Debug Statements" },
  { id = "check-merge-conflict", name = "Check Merge Conflict", args = [
    "--assume-in-merge",
  ] },
  { id = "check-ast", name = "Check AST" },
  { id = "detect-private-key", name = "Detect Private Key" },
]

[[repos]]
repo = "https://github.com/crate-ci/typos"
rev = "v1.40.0"
hooks = [{ id = "typos", name = "Typos Linter" }]

[[repos]]
repo = "https://github.com/python-jsonschema/check-jsonschema"
rev = "0.35.0"
hooks = [
  { id = "check-github-actions", name = "Validate GitHub Actions", args = [
    "--verbose",
  ] },
]

[[repos]]
repo = "https://github.com/rhysd/actionlint"
rev = "v1.7.7"
hooks = [{ id = "actionlint", name = "Actionlint Linter" }]

[[repos]]
repo = "https://github.com/adrienverge/yamllint.git"
rev = "v1.37.1"
hooks = [{ id = "yamllint", name = "YAML Linter" }]

[[repos]]
repo = "https://github.com/DavidAnson/markdownlint-cli2"
rev = "v0.18.1"
hooks = [{ id = "markdownlint-cli2", name = "Markdown Linter" }]

[[repos]]
repo = "https://github.com/google/yamlfmt"
rev = "v0.17.2"
hooks = [{ id = "yamlfmt", name = "YAML Formatter" }]

[[repos]]
repo = "https://github.com/asottile/pyupgrade"
rev = "v3.15.0"
hooks = [{ id = "pyupgrade", args = ["--py38-plus"] }]

[[repos]]
repo = "https://github.com/djlint/djLint"
rev = "v1.34.1"
hooks = [
  { id = "djlint-reformat-jinja", args = [
    "--configuration=pyproject.toml",
  ] },
  { id = "djlint-jinja" },
]
