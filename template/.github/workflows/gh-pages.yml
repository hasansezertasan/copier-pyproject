---
name: Github Pages
# Automatic docs deployment on release lives in the `deploy-docs` job of
# release-please.yml, because a `release: published` event fired by that
# workflow's GITHUB_TOKEN cannot trigger a separate workflow. This workflow is
# kept for manual, on-demand docs redeploys via the Actions tab.
on:
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Docs
    permissions:
      contents: write  # IMPORTANT: Mandatory for GitHub Pages
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version-file: .python-version
      - name: Setup uv
        id: setup-uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9  # v9.0.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - name: Restore cache
        if: steps.setup-uv.outputs.cache-hit == 'true'
        run: echo "Cache was restored"
      - name: Build docs
        run: uv run --no-default-groups --extra all --group docs sphinx-build -b html docs docs/_build/html
      - name: Deploy to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          uv run --no-default-groups --extra all --group docs ghp-import -n -p -f docs/_build/html
