---
name: Github Pages
# Automatic docs deployment on release lives in the `deploy-docs` job of
# release-please.yml, because a `release: published` event fired by that
# workflow's GITHUB_TOKEN cannot trigger a separate workflow. This workflow is
# kept for manual, on-demand docs redeploys via the Actions tab.
on:
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Deploy Docs
    permissions:
      contents: write  # IMPORTANT: Mandatory for GitHub Pages
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version-file: .python-version
      - name: Setup uv
        id: setup-uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - name: Restore cache
        if: steps.setup-uv.outputs.cache-hit == 'true'
        run: echo "Cache was restored"
      - name: Build docs
        run: uv run --no-default-groups --extra all --group docs sphinx-build -b html docs docs/_build/html
      - name: Deploy to GitHub Pages
        env:
          # The checkout no longer persists credentials, so re-supply the token
          # to the push remote explicitly (ghp-import -p pushes to gh-pages).
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          uv run --no-default-groups --extra all --group docs ghp-import -n -p -f docs/_build/html
