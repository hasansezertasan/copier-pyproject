---
name: "Dependency review"
on:
  pull_request:
    branches: ["main"]
permissions:
  contents: read
  # Allows the action to post its summary as a PR comment on failure.
  pull-requests: write
jobs:
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout code"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: "Dependency review"
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
        with:
          # Block PRs that introduce high or critical severity vulnerabilities.
          fail-on-severity: high
          comment-summary-in-pr: on-failure
